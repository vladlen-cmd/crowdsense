# camera_id maps to /dev/videoN on Linux.
# Run  python main.py --scan-cameras  to see which IDs are available on this Pi.
# Zones with an unavailable camera_id are skipped gracefully (no crash).

zones:
  cafeteria:
    max_capacity: 92
    camera_id: 0          # /dev/video0
    thresholds:
      open:      0.50   # < 50%  = OPEN
      moderate:  0.75   # >= 50% = MODERATE
      near_full: 0.90   # >= 75% = NEAR_FULL  /  >= 90% = FULL

  library:
    max_capacity: 60
    camera_id: 1          # change if  python main.py --scan-cameras  shows a different ID
    thresholds:
      open:      0.50
      moderate:  0.75
      near_full: 0.90

  auditorium:
    max_capacity: 100
    camera_id: 2          # /dev/video2
    thresholds:
      open:      0.50
      moderate:  0.75
      near_full: 0.90

camera:
  resolution: [640, 480]

detection:
  model_path: models/yolov5n-int8.tflite
  input_size: 320
  conf_threshold: 0.45
  min_distance_px: 50      

signage:
  mode: opencv            
  mqtt_host: localhost
  mqtt_port: 1883
  http_url: http://localhost:5000

alerts:
  cooldown_minutes: 5 

  email:
    enabled: true
    smtp_host: smtp.gmail.com
    smtp_port: 587
    username: vladlenonline@gmail.com
    password: ""              
    from_addr: vladlenonline@gmail.com
    to_addrs: [vladlenonline@gmail.com]

  ntfy:
    enabled: false
    topic: crowdsense-alerts
    server: https://ntfy.sh  
