<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CrowdSense</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --green:     #2ea043;
      --orange:    #d29922;
      --red-soft:  #da3633;
      --red-hard:  #8b0000;
    }

    * { box-sizing: border-box; }
    body         { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
    .card        { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
    .card-header { background: transparent; border-bottom: 1px solid var(--border); font-weight: 600; font-size: .82rem; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); padding: 10px 14px; }
    .text-muted  { color: var(--muted) !important; }

    /* Navbar */
    .navbar      { background: var(--surface); border-bottom: 1px solid var(--border); }
    .navbar-brand{ font-weight: 700; font-size: 1.15rem; letter-spacing: .02em; }
    #live-dot    { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
    #live-dot.off{ background: var(--red-soft); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    #total-badge { font-size: .8rem; background: rgba(88,166,255,.12); color: #79c0ff; border-radius: 20px; padding: 2px 10px; }

    /* Zone cards */
    .zone-card   { transition: box-shadow .2s; }
    .zone-card:hover { box-shadow: 0 0 0 1px var(--border), 0 4px 20px rgba(0,0,0,.45); }
    .zone-name   { font-size: .95rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }
    .zone-count  { font-size: 2rem; font-weight: 700; line-height: 1.1; }
    .zone-cap    { font-size: .82rem; color: var(--muted); }

    .sbadge      { font-size: .68rem; font-weight: 700; letter-spacing: .08em; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; }
    .s-OPEN       { background: rgba(46,160,67,.15);  color: #3fb950; }
    .s-MODERATE   { background: rgba(210,153,34,.18); color: #e3b341; }
    .s-NEAR_FULL  { background: rgba(218,54,51,.18);  color: #f85149; }
    .s-FULL       { background: rgba(139,0,0,.35);    color: #ffa198; }

    .bar-wrap    { background: #21262d; border-radius: 4px; height: 7px; overflow: hidden; }
    .bar-fill    { height: 100%; border-radius: 4px; transition: width .5s ease; }
    .b-OPEN       { background: var(--green); }
    .b-MODERATE   { background: var(--orange); }
    .b-NEAR_FULL  { background: var(--red-soft); }
    .b-FULL       { background: var(--red-hard); box-shadow: 0 0 6px rgba(139,0,0,.5); }

    .vpill       { font-size: .72rem; padding: 2px 7px; border-radius: 12px; }
    .vpill.bad   { background: rgba(218,54,51,.15); color: #f85149; }
    .vpill.ok    { background: rgba(46,160,67,.12);  color: #3fb950; }

    .fc-wrap     { height: 72px; }

    /* Zone feed tabs */
    .feed-tabs   { border-bottom: 1px solid var(--border); padding: 0 14px; gap: 4px; display: flex; flex-wrap: wrap; }
    .feed-tab    { font-size: .78rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; padding: 8px 14px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; background: none; border-top: none; border-left: none; border-right: none; }
    .feed-tab:hover  { color: var(--text); }
    .feed-tab.active { color: var(--text); border-bottom-color: #58a6ff; }
    .feed-pane   { display: none; }
    .feed-pane.active { display: flex; gap: 12px; flex-wrap: wrap; padding: 14px; }

    /* Live stream */
    .stream-wrap { position: relative; flex: 1 1 300px; min-width: 0; }
    .stream-label{ position: absolute; top: 8px; left: 8px; font-size: .7rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; background: rgba(0,0,0,.6); color: #e6edf3; padding: 2px 8px; border-radius: 4px; z-index: 2; }
    .stream-badge{ position: absolute; top: 8px; right: 8px; font-size: .65rem; font-weight: 700; background: #da3633; color: #fff; padding: 2px 6px; border-radius: 4px; z-index: 2; animation: pulse 1.5s infinite; }
    .stream-img  { width: 100%; border-radius: 8px; border: 1px solid var(--border); display: block; background: #21262d; min-height: 160px; object-fit: cover; }
    .stream-img.offline { filter: grayscale(1) opacity(.4); }

    /* Heatmap */
    .heatmap-wrap{ flex: 1 1 200px; min-width: 0; }
    .heatmap-img { width: 100%; border-radius: 8px; border: 1px solid var(--border); display: block; min-height: 160px; object-fit: cover; background: #21262d; }
    .heatmap-none{ width: 100%; min-height: 160px; background: #21262d; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: .78rem; border: 1px solid var(--border); }

    /* Alert rows */
    .arow        { border-left: 3px solid transparent; padding: 7px 10px; margin-bottom: 4px; border-radius: 4px; background: rgba(255,255,255,.03); font-size: .8rem; }
    .arow.warn   { border-color: var(--orange); }
    .arow.danger { border-color: var(--red-soft); }
    .arow.info   { border-color: #58a6ff; }
    .atime       { color: var(--muted); font-size: .72rem; float: right; }
    .no-alerts   { color: var(--muted); font-size: .82rem; text-align: center; padding: 18px 0; }

    #refresh-info{ font-size: .75rem; color: var(--muted); }
    #countdown   { font-weight: 600; color: var(--text); }

    select.dark  { background: var(--surface); color: var(--text); border-color: var(--border); font-size: .78rem; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-3 py-2 mb-3">
  <span class="navbar-brand"><span id="live-dot"></span>CrowdSense</span>
  <span id="total-badge">— people total</span>
  <span id="refresh-info">Refreshing in <span id="countdown">5</span>s</span>
</nav>

<div class="container-fluid px-3">

  <!-- ── Zone summary cards ── -->
  <div class="row g-3 mb-3" id="zone-cards">
    <div class="col-12 text-center text-muted py-5">Connecting to API…</div>
  </div>

  <!-- ── Live feeds + heatmaps ── -->
  <div class="card mb-3">
    <div class="d-flex align-items-center justify-content-between pe-3">
      <div class="feed-tabs" id="feed-tabs"><!-- tabs injected --></div>
      <span style="font-size:.72rem;color:var(--muted)">Live &amp; heatmap</span>
    </div>
    <div id="feed-panes"><!-- panes injected --></div>
  </div>

  <!-- ── History + Alerts ── -->
  <div class="row g-3 mb-3">
    <div class="col-lg-8">
      <div class="card h-100">
        <div class="card-header d-flex justify-content-between align-items-center">
          Occupancy History
          <select id="history-minutes" class="form-select dark w-auto">
            <option value="30">30 min</option>
            <option value="60" selected>1 h</option>
            <option value="120">2 h</option>
            <option value="360">6 h</option>
          </select>
        </div>
        <div class="card-body"><canvas id="history-chart" height="90"></canvas></div>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="card h-100">
        <div class="card-header d-flex justify-content-between align-items-center">
          Active Alerts <span id="alert-count" class="badge bg-secondary">0</span>
        </div>
        <div class="card-body overflow-auto" style="max-height:260px" id="alert-list">
          <div class="no-alerts">All clear</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Alert history ── -->
  <div class="card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center">
      Alert History
      <select id="alert-zone-filter" class="form-select dark w-auto">
        <option value="">All zones</option>
      </select>
    </div>
    <div class="card-body overflow-auto" style="max-height:220px" id="alert-history-list">
      <div class="no-alerts">No history yet</div>
    </div>
  </div>

</div><!-- /container -->

<script>
const REFRESH  = 5000;
const COLORS   = ['#58a6ff','#3fb950','#e3b341','#f85149','#d2a8ff','#79c0ff'];

let historyChart  = null;
let forecastCharts= {};
let knownZones    = [];
let activeTab     = null;
let countdown     = REFRESH / 1000;

// ── Utilities ────────────────────────────────────────────────────────────────

const fmt  = ts => new Date(ts*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const ago  = ts => { const s=Math.floor(Date.now()/1000-ts); return s<60?`${s}s ago`:s<3600?`${Math.floor(s/60)}m ago`:`${Math.floor(s/3600)}h ago`; };
const json = url => fetch(url).then(r => { if(!r.ok) throw r.status; return r.json(); });

// ── Zone summary cards ────────────────────────────────────────────────────────

function cardHTML(z, idx) {
  const st  = z.status || 'OPEN';
  const occ = z.occupancy || 0;
  const vio = z.violations || 0;
  const col = COLORS[idx % COLORS.length];
  return `
  <div class="col-sm-6 col-xl-4">
    <div class="card zone-card p-3" id="zcard-${z.zone}">
      <div class="d-flex justify-content-between align-items-start mb-1">
        <span class="zone-name" style="color:${col}">${z.zone}</span>
        <span class="sbadge s-${st}">${st.replace('_',' ')}</span>
      </div>
      <div class="zone-count">${z.count??'—'}<span class="zone-cap"> / ${z.capacity??'—'}</span></div>
      <div class="text-muted mb-2" style="font-size:.75rem">people</div>
      <div class="bar-wrap mb-1"><div class="bar-fill b-${st}" style="width:${Math.min(occ,100)}%"></div></div>
      <div class="d-flex justify-content-between mb-2" style="font-size:.74rem">
        <span class="text-muted">${occ.toFixed(1)}% occupied</span>
        <span class="vpill ${vio?'bad':'ok'}">${vio} violation${vio!==1?'s':''}</span>
      </div>
      <div style="font-size:.72rem;color:var(--muted)" class="mb-1">60-min forecast</div>
      <div class="fc-wrap"><canvas id="fc-${z.zone}"></canvas></div>
      <div class="mt-2 text-muted" style="font-size:.7rem" id="fps-${z.zone}">${z.fps??'—'} fps · ${z.latency_ms??'—'} ms</div>
    </div>
  </div>`;
}

function updateCard(z) {
  const card = document.getElementById(`zcard-${z.zone}`);
  if (!card) return;
  const st  = z.status || 'OPEN';
  const occ = z.occupancy || 0;
  const vio = z.violations || 0;

  card.querySelector('.sbadge').className = `sbadge s-${st}`;
  card.querySelector('.sbadge').textContent = st.replace('_',' ');
  card.querySelector('.zone-count').innerHTML = `${z.count??'—'}<span class="zone-cap"> / ${z.capacity??'—'}</span>`;

  const fill = card.querySelector('.bar-fill');
  fill.className = `bar-fill b-${st}`;
  fill.style.width = `${Math.min(occ,100)}%`;

  const [occSpan, vPill] = card.querySelectorAll('.d-flex.justify-content-between.mb-2 span');
  occSpan.textContent = `${occ.toFixed(1)}% occupied`;
  vPill.className = `vpill ${vio?'bad':'ok'}`;
  vPill.textContent = `${vio} violation${vio!==1?'s':''}`;

  document.getElementById(`fps-${z.zone}`).textContent = `${z.fps??'—'} fps · ${z.latency_ms??'—'} ms`;

  const badge = document.getElementById(`sbadge-${z.zone}`);
  if (badge) { badge.textContent = st.replace('_',' '); badge.style.background = {OPEN:'#2ea043',MODERATE:'#d29922',NEAR_FULL:'#da3633',FULL:'#8b0000'}[st]||'#da3633'; }
}

function buildFeedPanes(zones) {
  const tabsEl  = document.getElementById('feed-tabs');
  const panesEl = document.getElementById('feed-panes');
  tabsEl.innerHTML  = '';
  panesEl.innerHTML = '';

  zones.forEach((z, i) => {
    const col = COLORS[i % COLORS.length];

    const btn = document.createElement('button');
    btn.className = `feed-tab${i===0?' active':''}`;
    btn.textContent = z.zone;
    btn.style.color = i===0 ? col : '';
    btn.dataset.zone = z.zone;
    btn.dataset.color = col;
    btn.onclick = () => switchTab(z.zone);
    tabsEl.appendChild(btn);

    const pane = document.createElement('div');
    pane.className = `feed-pane${i===0?' active':''}`;
    pane.id = `pane-${z.zone}`;
    pane.innerHTML = `
      <div class="stream-wrap">
        <span class="stream-label">${z.zone}</span>
        <span class="stream-badge" id="sbadge-${z.zone}">LIVE</span>
        <img class="stream-img" id="stream-${z.zone}"
             src="/api/zones/${z.zone}/stream"
             alt="${z.zone} live feed"
             onerror="this.classList.add('offline');document.getElementById('sbadge-${z.zone}').textContent='OFFLINE';document.getElementById('sbadge-${z.zone}').style.background='#555'">
      </div>
      <div class="heatmap-wrap">
        <div style="font-size:.72rem;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase">Density Heatmap</div>
        <div id="hm-wrap-${z.zone}"><div class="heatmap-none">Waiting for heatmap…</div></div>
      </div>`;
    panesEl.appendChild(pane);
  });

  activeTab = zones[0]?.zone;
}

function switchTab(zone) {
  activeTab = zone;
  document.querySelectorAll('.feed-tab').forEach(b => {
    const active = b.dataset.zone === zone;
    b.classList.toggle('active', active);
    b.style.color = active ? b.dataset.color : '';
  });
  document.querySelectorAll('.feed-pane').forEach(p =>
    p.classList.toggle('active', p.id === `pane-${zone}`)
  );
}

async function refreshHeatmaps() {
  for (const zone of knownZones) {
    try {
      const data = await json(`/api/zones/${zone}/heatmap.b64`);
      const wrap = document.getElementById(`hm-wrap-${zone}`);
      if (wrap && data.image) {
        let img = wrap.querySelector('img');
        if (!img) {
          wrap.innerHTML = `<img class="heatmap-img" alt="${zone} heatmap">`;
          img = wrap.querySelector('img');
        }
        img.src = data.image;
      }
    } catch { /* not available yet */ }
  }
}

async function refreshForecast(zone, color) {
  try {
    const data = await json(`/api/zones/${zone}/forecast`);
    const fc   = data.forecast || [];
    if (!fc.length) return;
    const canvas = document.getElementById(`fc-${zone}`);
    if (!canvas) return;
    if (forecastCharts[zone]) forecastCharts[zone].destroy();
    forecastCharts[zone] = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: {
        labels: fc.map(p=>`+${p.minutes_ahead}m`),
        datasets: [{ data: fc.map(p=>p.occupancy_pct), borderColor: color,
          backgroundColor: color+'22', fill:true, tension:.4, pointRadius:0, borderWidth:1.5 }],
      },
      options: { responsive:true, animation:false,
        plugins:{ legend:{display:false}, tooltip:{enabled:false} },
        scales:{ x:{display:false}, y:{min:0,max:100,display:false} } },
    });
  } catch { /* no forecast yet */ }
}

function initHistoryChart() {
  historyChart = new Chart(
    document.getElementById('history-chart').getContext('2d'), {
      type: 'line',
      data: { labels:[], datasets:[] },
      options: {
        responsive:true, animation:false,
        interaction:{ mode:'index', intersect:false },
        scales: {
          x: { ticks:{color:'#8b949e',maxTicksLimit:8}, grid:{color:'#21262d'} },
          y: { min:0, max:100, ticks:{color:'#8b949e',callback:v=>v+'%'}, grid:{color:'#21262d'} },
        },
        plugins: {
          legend:{ labels:{color:'#e6edf3'} },
          tooltip:{ callbacks:{ label:c=>` ${c.dataset.label}: ${c.parsed.y.toFixed(1)}%` } },
        },
      },
    }
  );
}

async function refreshHistory() {
  const mins = document.getElementById('history-minutes').value;
  try {
    const data = await json(`/api/metrics/history?minutes=${mins}`);
    const sets = knownZones.map((zone, i) => {
      const entries = data[zone] || [];
      return {
        label: zone,
        data: entries.map(e => e.occupancy),
        borderColor: COLORS[i % COLORS.length],
        backgroundColor: 'transparent',
        tension: 0.3, pointRadius: 0, borderWidth: 2,
      };
    });
    const labels = (data[knownZones[0]] || []).map(e => fmt(e.t));
    historyChart.data.labels   = labels;
    historyChart.data.datasets = sets;
    historyChart.update('none');
  } catch(e) { console.warn('History failed', e); }
}

async function refreshAlerts() {
  try {
    const data   = await json('/api/alerts');
    const alerts = data.alerts || [];
    const badge  = document.getElementById('alert-count');
    badge.textContent = alerts.length;
    badge.className   = `badge ${alerts.length?'bg-danger':'bg-secondary'}`;
    document.getElementById('alert-list').innerHTML = alerts.length
      ? alerts.map(a=>`<div class="arow ${a.level}"><strong>${a.zone}</strong> — ${a.message}<span class="atime">${ago(a.ts)}</span></div>`).join('')
      : '<div class="no-alerts">All zones are clear</div>';
  } catch {}
}

async function refreshAlertHistory() {
  const zone = document.getElementById('alert-zone-filter').value;
  try {
    const data   = await json(`/api/alerts/history?limit=40${zone?'&zone='+zone:''}`);
    const alerts = (data.alerts||[]).slice().reverse();
    document.getElementById('alert-history-list').innerHTML = alerts.length
      ? alerts.map(a=>`<div class="arow ${a.level}"><strong>${a.zone}</strong> — ${a.message}<span class="atime">${ago(a.timestamp)}</span></div>`).join('')
      : '<div class="no-alerts">No history yet</div>';
  } catch {}
}

async function refreshAll() {
  const dot = document.getElementById('live-dot');
  try {
    const data  = await json('/api/zones');
    const zones = data.zones || [];
    dot.classList.remove('off');

    document.getElementById('total-badge').textContent = `${data.total_people??'—'} people total`;

    if (knownZones.length === 0) {
      knownZones = zones.map(z => z.zone);

      document.getElementById('zone-cards').innerHTML = zones.map((z,i) => cardHTML(z,i)).join('');
      buildFeedPanes(zones);
      initHistoryChart();

      const sel = document.getElementById('alert-zone-filter');
      knownZones.forEach(z => { const o=document.createElement('option'); o.value=z; o.textContent=z; sel.appendChild(o); });
    } else {
      zones.forEach(z => updateCard(z));
    }

    zones.forEach((z,i) => refreshForecast(z.zone, COLORS[i%COLORS.length]));
    await Promise.all([refreshHistory(), refreshAlerts(), refreshAlertHistory(), refreshHeatmaps()]);

  } catch(e) {
    dot.classList.add('off');
    console.warn('API unreachable', e);
  }
}

function startCountdown() {
  countdown = REFRESH / 1000;
  const el  = document.getElementById('countdown');
  const t   = setInterval(() => {
    el.textContent = --countdown;
    if (countdown <= 0) { clearInterval(t); refreshAll().then(startCountdown); }
  }, 1000);
}

document.getElementById('history-minutes').addEventListener('change', refreshHistory);
document.getElementById('alert-zone-filter').addEventListener('change', refreshAlertHistory);

refreshAll().then(startCountdown);
</script>
</body>
</html>
